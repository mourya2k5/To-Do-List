version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_jwt_key_todo_app
    depends_on:
      - redis
    networks:
      - todo-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    networks:
      - todo-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  redis-data:
